name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag in the form vX.Y.Z
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify Tag And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="$(grep -m1 '^version = "' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"

          if [[ -z "${tag}" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          if [[ "v${version}" != "${tag}" ]]; then
            echo "Tag ${tag} does not match workspace version v${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo test
        run: cargo test --workspace --locked

  build:
    name: Build Release Artifacts
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Resolve host target
        id: host
        shell: bash
        run: |
          set -euo pipefail
          echo "target=$(rustc -vV | sed -n 's/^host: //p')" >> "${GITHUB_OUTPUT}"

      - name: Build binaries
        run: cargo build --release --workspace --locked

      - name: Package archives
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          TARGET_TRIPLE: ${{ steps.host.outputs.target }}
        run: |
          set -euo pipefail

          package_dir="dist/vibe-remote-${VERSION}-${TARGET_TRIPLE}"
          mkdir -p "${package_dir}"

          bins=(vibe vibe-agent vibe-server vibe-app-logs)
          suffix=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            suffix=".exe"
          fi

          for bin in "${bins[@]}"; do
            cp "target/release/${bin}${suffix}" "${package_dir}/"
          done

          cp README.md LICENSE "${package_dir}/"

          archive="dist/vibe-remote-${VERSION}-${TARGET_TRIPLE}.tar.gz"
          tar -czf "${archive}" -C dist "vibe-remote-${VERSION}-${TARGET_TRIPLE}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.host.outputs.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
