name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  NPCAP_SDK_VERSION: "1.16"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "25.2.9519653"

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --locked -p vibe-relay -p vibe-agent -p vibe-app

      - name: Run workspace tests
        run: cargo test --locked --workspace --all-targets -- --nocapture

      - name: Build frontend
        working-directory: apps/vibe-app
        run: npm run build

      - name: Run relay polling smoke test
        run: ./scripts/dual-process-smoke.sh relay_polling

      - name: Run overlay smoke test (best effort)
        continue-on-error: true
        run: ./scripts/dual-process-smoke.sh overlay

  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-24.04
            artifact_name: vibe-remote-cli-x86_64-unknown-linux-gnu
            archive_basename: vibe-remote-cli-x86_64-unknown-linux-gnu
            archive_name: vibe-remote-cli-x86_64-unknown-linux-gnu.tar.gz
            bin_ext: ""
          - label: Windows
            os: windows-2022
            artifact_name: vibe-remote-cli-x86_64-pc-windows-msvc
            archive_basename: vibe-remote-cli-x86_64-pc-windows-msvc
            archive_name: vibe-remote-cli-x86_64-pc-windows-msvc.zip
            bin_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdbus-1-dev

      - name: Setup Npcap SDK import libraries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkZip = Join-Path $env:RUNNER_TEMP "npcap-sdk.zip"
          $sdkDir = Join-Path $env:RUNNER_TEMP "npcap-sdk"
          curl.exe -fsSL --retry 5 --retry-all-errors "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip" -o $sdkZip
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force
          $packetLib = Get-ChildItem -Path $sdkDir -Recurse -Filter Packet.lib |
            Where-Object { $_.FullName -match '[\\/]+Lib[\\/]+x64[\\/]+Packet\.lib$' } |
            Select-Object -First 1
          if (-not $packetLib) {
            throw "Npcap Packet.lib not found under $sdkDir"
          }
          $libDir = $packetLib.Directory.FullName
          "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release -p vibe-relay -p vibe-agent

      - name: Package Linux CLI archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARCHIVE_FORMAT: gztar
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          set -euo pipefail
          staging_dir="$RUNNER_TEMP/$ARCHIVE_BASENAME"
          mkdir -p "$staging_dir"

          cp "target/release/vibe-relay$BIN_EXT" "$staging_dir/"
          cp "target/release/vibe-agent$BIN_EXT" "$staging_dir/"
          cp README.md README.en.md LICENSE "$staging_dir/"

          export STAGING_DIR="$staging_dir"
          export ARCHIVE_BASE_PATH="$GITHUB_WORKSPACE/$ARCHIVE_BASENAME"
          python3 - <<'PY'
          import os
          import shutil

          shutil.make_archive(
              os.environ["ARCHIVE_BASE_PATH"],
              os.environ["ARCHIVE_FORMAT"],
              os.environ["STAGING_DIR"],
          )
          PY

          test -f "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Package Windows CLI archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP $env:ARCHIVE_BASENAME
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          Copy-Item "target/release/vibe-relay$env:BIN_EXT" $stagingDir
          Copy-Item "target/release/vibe-agent$env:BIN_EXT" $stagingDir
          Copy-Item README.md, README.en.md, LICENSE -Destination $stagingDir

          $archivePath = Join-Path $env:GITHUB_WORKSPACE $env:ARCHIVE_NAME
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Push-Location $stagingDir
          Compress-Archive -Path * -DestinationPath $archivePath
          Pop-Location

          if (-not (Test-Path $archivePath)) {
            throw "Failed to create $archivePath"
          }

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

  build-desktop:
    name: Build Desktop (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-24.04
            artifact_name: vibe-remote-desktop-x86_64-unknown-linux-gnu
            archive_basename: vibe-remote-desktop-x86_64-unknown-linux-gnu
            archive_name: vibe-remote-desktop-x86_64-unknown-linux-gnu.tar.gz
          - label: Windows
            os: windows-2022
            artifact_name: vibe-remote-desktop-x86_64-pc-windows-msvc
            archive_basename: vibe-remote-desktop-x86_64-pc-windows-msvc
            archive_name: vibe-remote-desktop-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Build Tauri desktop bundles
        working-directory: apps/vibe-app
        run: npm run tauri -- build --ci

      - name: Package Linux desktop archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARCHIVE_FORMAT: gztar
        run: |
          set -euo pipefail
          bundle_dir="$(find "$GITHUB_WORKSPACE" -type d -path '*/target/release/bundle' | head -n 1)"
          if [[ -z "$bundle_dir" ]]; then
            echo "Failed to locate Tauri bundle output" >&2
            exit 1
          fi

          staging_dir="$RUNNER_TEMP/$ARCHIVE_BASENAME"
          mkdir -p "$staging_dir"
          cp README.md README.en.md LICENSE "$staging_dir/"
          cp -R "$bundle_dir" "$staging_dir/bundle"

          export STAGING_DIR="$staging_dir"
          export ARCHIVE_BASE_PATH="$GITHUB_WORKSPACE/$ARCHIVE_BASENAME"
          python3 - <<'PY'
          import os
          import shutil

          shutil.make_archive(
              os.environ["ARCHIVE_BASE_PATH"],
              os.environ["ARCHIVE_FORMAT"],
              os.environ["STAGING_DIR"],
          )
          PY

          test -f "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Package Windows desktop archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          $bundleDir = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Directory |
            Where-Object { $_.FullName -match '[\\/]+target[\\/]+release[\\/]+bundle$' } |
            Select-Object -First 1
          if (-not $bundleDir) {
            throw "Failed to locate Tauri bundle output"
          }

          $stagingDir = Join-Path $env:RUNNER_TEMP $env:ARCHIVE_BASENAME
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item README.md, README.en.md, LICENSE -Destination $stagingDir
          Copy-Item -Recurse $bundleDir.FullName (Join-Path $stagingDir "bundle")

          $archivePath = Join-Path $env:GITHUB_WORKSPACE $env:ARCHIVE_NAME
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Push-Location $stagingDir
          Compress-Archive -Path * -DestinationPath $archivePath
          Pop-Location

          if (-not (Test-Path $archivePath)) {
            throw "Failed to create $archivePath"
          }

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses > /dev/null

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Validate Android toolchain
        working-directory: apps/vibe-app
        run: npm run android:doctor

      - name: Build Android debug APK
        working-directory: apps/vibe-app
        run: npm run android:build:debug:apk

      - name: Build Android release APK
        working-directory: apps/vibe-app
        run: npm run android:build:apk

      - name: Build Android release AAB
        working-directory: apps/vibe-app
        run: npm run android:build:aab

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail

          debug_apk="apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk"
          release_apk="$(find apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk -type f -path '*release/*.apk' | head -n 1)"
          release_aab="$(find apps/vibe-app/src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' | head -n 1)"

          test -f "$debug_apk"
          test -n "$release_apk" && test -f "$release_apk"
          test -n "$release_aab" && test -f "$release_aab"

          cp "$debug_apk" "$GITHUB_WORKSPACE/vibe-remote-android-arm64-debug.apk"

          release_apk_name="vibe-remote-android-arm64-release.apk"
          if [[ "$release_apk" == *unsigned.apk ]]; then
            release_apk_name="vibe-remote-android-arm64-release-unsigned.apk"
          fi
          cp "$release_apk" "$GITHUB_WORKSPACE/$release_apk_name"
          cp "$release_aab" "$GITHUB_WORKSPACE/vibe-remote-android-arm64-release.aab"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-remote-android-arm64
          path: |
            ${{ github.workspace }}/vibe-remote-android-arm64-*.apk
            ${{ github.workspace }}/vibe-remote-android-arm64-*.aab
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs:
      - build-cli
      - build-desktop
      - build-android
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: vibe-remote-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
