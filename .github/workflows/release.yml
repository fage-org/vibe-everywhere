name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24.14.0"
  PROTOC_VERSION: "34.1"
  NPCAP_SDK_VERSION: "1.16"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "25.2.9519653"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Verify release version sources
        run: ./scripts/verify-release-version.sh "${RELEASE_TAG}"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --locked -p vibe-relay -p vibe-agent -p vibe-app

      - name: Run workspace tests
        run: cargo test --locked --workspace --all-targets -- --nocapture

      - name: Build frontend
        working-directory: apps/vibe-app
        run: npm run build

      - name: Run relay polling smoke test
        run: ./scripts/dual-process-smoke.sh relay_polling

  linux-overlay-smoke:
    name: Linux Overlay Smoke
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libdbus-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run hosted Linux overlay smoke
        env:
          TMPDIR: ${{ runner.temp }}
          VIBE_TEST_EASYTIER_NO_TUN: "1"
        run: ./scripts/dual-process-smoke.sh overlay

      - name: Upload overlay smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-overlay-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vibe-everywhere-dual-process.*
          if-no-files-found: ignore
          retention-days: 14

  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-24.04
            artifact_name: vibe-everywhere-cli-x86_64-unknown-linux-musl
            archive_basename: vibe-everywhere-cli-x86_64-unknown-linux-musl
            platform_suffix: x86_64-unknown-linux-musl
            rust_target: x86_64-unknown-linux-musl
            bin_ext: ""
          - label: Windows
            os: windows-2022
            artifact_name: vibe-everywhere-cli-x86_64-pc-windows-msvc
            archive_basename: vibe-everywhere-cli-x86_64-pc-windows-msvc
            platform_suffix: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            bin_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            build-essential \
            file \
            musl-tools

      - name: Setup Npcap SDK import libraries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkZip = Join-Path $env:RUNNER_TEMP "npcap-sdk.zip"
          $sdkDir = Join-Path $env:RUNNER_TEMP "npcap-sdk"
          curl.exe -fsSL --retry 5 --retry-all-errors "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip" -o $sdkZip
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force
          $packetLib = Get-ChildItem -Path $sdkDir -Recurse -Filter Packet.lib |
            Where-Object { $_.FullName -match '[\\/]+Lib[\\/]+x64[\\/]+Packet\.lib$' } |
            Select-Object -First 1
          if (-not $packetLib) {
            throw "Npcap Packet.lib not found under $sdkDir"
          }
          $libDir = $packetLib.Directory.FullName
          "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Setup Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        if: runner.os != 'Windows'
        run: cargo build --locked --release --target x86_64-unknown-linux-musl -p vibe-relay -p vibe-agent

      - name: Build release binaries (Windows)
        if: runner.os == 'Windows'
        env:
          WINDIVERT_DLL_OUTPUT: ${{ github.workspace }}\target\release
        run: cargo build --locked --release -p vibe-relay -p vibe-agent

      - name: Verify static Linux CLI binaries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for binary in \
            target/x86_64-unknown-linux-musl/release/vibe-relay \
            target/x86_64-unknown-linux-musl/release/vibe-agent; do
            file "$binary" | grep -E "statically linked|static-pie linked"
            if readelf -d "$binary" 2>/dev/null | grep -q '(NEEDED)'; then
              echo "Unexpected dynamic dependency in $binary" >&2
              exit 1
            fi
          done

      - name: Stage Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/stage-windows-runtime.ps1 -Profile release

      - name: Package Linux CLI archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          PLATFORM_SUFFIX: ${{ matrix.platform_suffix }}
          ARCHIVE_FORMAT: gztar
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          set -euo pipefail
          archive_basename="vibe-everywhere-cli-${RELEASE_TAG}-${PLATFORM_SUFFIX}"
          archive_name="${archive_basename}.tar.gz"
          staging_dir="$RUNNER_TEMP/$archive_basename"
          mkdir -p "$staging_dir"

          cp "target/x86_64-unknown-linux-musl/release/vibe-relay$BIN_EXT" "$staging_dir/"
          cp "target/x86_64-unknown-linux-musl/release/vibe-agent$BIN_EXT" "$staging_dir/"

          export STAGING_DIR="$staging_dir"
          export ARCHIVE_BASE_PATH="$GITHUB_WORKSPACE/$archive_basename"
          python3 - <<'PY'
          import os
          import shutil

          shutil.make_archive(
              os.environ["ARCHIVE_BASE_PATH"],
              os.environ["ARCHIVE_FORMAT"],
              os.environ["STAGING_DIR"],
          )
          PY

          test -f "$GITHUB_WORKSPACE/$archive_name"

      - name: Package Windows CLI archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          PLATFORM_SUFFIX: ${{ matrix.platform_suffix }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          $archiveBaseName = "vibe-everywhere-cli-$env:RELEASE_TAG-$env:PLATFORM_SUFFIX"
          $archiveName = "$archiveBaseName.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP $archiveBaseName
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          ./scripts/stage-windows-runtime.ps1 `
            -Profile release `
            -DestinationDir $stagingDir `
            -BinaryNames @("vibe-relay$env:BIN_EXT", "vibe-agent$env:BIN_EXT")

          $archivePath = Join-Path $env:GITHUB_WORKSPACE $archiveName
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Push-Location $stagingDir
          Compress-Archive -Path * -DestinationPath $archivePath
          Pop-Location

          if (-not (Test-Path $archivePath)) {
            throw "Failed to create $archivePath"
          }

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: ${{ github.workspace }}/vibe-everywhere-cli-${{ github.ref_name }}-${{ matrix.platform_suffix }}*
          if-no-files-found: error
          retention-days: 14

  build-desktop:
    name: Build Desktop (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-24.04
            artifact_name: vibe-everywhere-desktop-linux-x86_64
            platform_slug: linux-x86_64
          - label: Windows
            os: windows-2022
            artifact_name: vibe-everywhere-desktop-windows-x86_64
            platform_slug: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Build Tauri desktop bundles
        working-directory: apps/vibe-app
        run: npm run tauri -- build --ci

      - name: Collect Linux desktop artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="$(find "$GITHUB_WORKSPACE" -type d -path '*/target/release/bundle' | head -n 1)"
          if [[ -z "$bundle_dir" ]]; then
            echo "Failed to locate Tauri bundle output" >&2
            exit 1
          fi

          mapfile -t bundle_files < <(
            find "$bundle_dir" -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) | sort
          )
          if [[ ${#bundle_files[@]} -eq 0 ]]; then
            echo "Failed to locate Linux desktop bundle outputs" >&2
            exit 1
          fi

          for bundle_file in "${bundle_files[@]}"; do
            case "$bundle_file" in
              *.AppImage) dest_name="vibe-everywhere-desktop-${RELEASE_TAG}-linux-x86_64.AppImage" ;;
              *.deb) dest_name="vibe-everywhere-desktop-${RELEASE_TAG}-linux-x86_64.deb" ;;
              *.rpm) dest_name="vibe-everywhere-desktop-${RELEASE_TAG}-linux-x86_64.rpm" ;;
              *) continue ;;
            esac

            cp "$bundle_file" "$GITHUB_WORKSPACE/$dest_name"
          done

          compgen -G "$GITHUB_WORKSPACE/vibe-everywhere-desktop-${RELEASE_TAG}-linux-x86_64.*" > /dev/null

      - name: Collect Windows desktop artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleDir = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Directory |
            Where-Object { $_.FullName -match '[\\/]+target[\\/]+release[\\/]+bundle$' } |
            Select-Object -First 1
          if (-not $bundleDir) {
            throw "Failed to locate Tauri bundle output"
          }

          $bundleFiles = Get-ChildItem -Path $bundleDir.FullName -Recurse -File |
            Where-Object {
              $_.Extension -eq '.msi' -or (
                $_.Extension -eq '.exe' -and
                $_.FullName -match '[\\/]+bundle[\\/]+nsis[\\/]'
              )
            }
          if (-not $bundleFiles) {
            throw "Failed to locate Windows desktop bundle outputs"
          }

          foreach ($bundleFile in $bundleFiles) {
            $destName = switch ($bundleFile.Extension.ToLowerInvariant()) {
              '.msi' { "vibe-everywhere-desktop-$env:RELEASE_TAG-windows-x86_64.msi" }
              '.exe' { "vibe-everywhere-desktop-$env:RELEASE_TAG-windows-x86_64.exe" }
              default { $null }
            }

            if ($null -ne $destName) {
              Copy-Item $bundleFile.FullName (Join-Path $env:GITHUB_WORKSPACE $destName) -Force
            }
          }

          $expectedAssets = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "vibe-everywhere-desktop-$env:RELEASE_TAG-windows-x86_64.*"
          if (-not $expectedAssets) {
            throw "Failed to stage Windows desktop release assets"
          }

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: ${{ github.workspace }}/vibe-everywhere-desktop-${{ github.ref_name }}-${{ matrix.platform_slug }}.*
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          cache-dependency-path: |
            apps/vibe-app/src-tauri/gen/android/**/*.gradle*
            apps/vibe-app/src-tauri/gen/android/**/gradle-wrapper.properties
            apps/vibe-app/src-tauri/gen/android/**/gradle.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore Android SDK component cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/licenses
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/platforms/android-${{ env.ANDROID_API_LEVEL }}
            ${{ env.ANDROID_SDK_ROOT }}/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: android-sdk-${{ runner.os }}-api${{ env.ANDROID_API_LEVEL }}-bt${{ env.ANDROID_BUILD_TOOLS_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}-v1

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses > /dev/null

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Configure Android release signing
        shell: bash
        env:
          VIBE_ANDROID_KEYSTORE_BASE64: ${{ secrets.VIBE_ANDROID_KEYSTORE_BASE64 }}
          VIBE_ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.VIBE_ANDROID_KEYSTORE_PASSWORD }}
          VIBE_ANDROID_KEY_ALIAS_SECRET: ${{ secrets.VIBE_ANDROID_KEY_ALIAS }}
          VIBE_ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.VIBE_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${VIBE_ANDROID_KEYSTORE_BASE64:-}" || -z "${VIBE_ANDROID_KEYSTORE_PASSWORD_SECRET:-}" || -z "${VIBE_ANDROID_KEY_ALIAS_SECRET:-}" || -z "${VIBE_ANDROID_KEY_PASSWORD_SECRET:-}" ]]; then
            exit 0
          fi

          keystore_path="$RUNNER_TEMP/vibe-everywhere-release.jks"
          printf '%s' "$VIBE_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          printf 'VIBE_ANDROID_KEYSTORE_PATH=%s\n' "$keystore_path" >> "$GITHUB_ENV"
          printf 'VIBE_ANDROID_KEYSTORE_PASSWORD=%s\n' "$VIBE_ANDROID_KEYSTORE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          printf 'VIBE_ANDROID_KEY_ALIAS=%s\n' "$VIBE_ANDROID_KEY_ALIAS_SECRET" >> "$GITHUB_ENV"
          printf 'VIBE_ANDROID_KEY_PASSWORD=%s\n' "$VIBE_ANDROID_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"

      - name: Report Android release signing mode
        shell: bash
        run: |
          if [[ -n "${VIBE_ANDROID_KEYSTORE_PATH:-}" ]]; then
            echo "Android release signing is enabled for this workflow run."
          else
            echo "Android release signing secrets are not configured; release APK/AAB will be unsigned."
          fi

      - name: Validate Android toolchain
        working-directory: apps/vibe-app
        run: npm run android:doctor

      - name: Build Android debug APK
        working-directory: apps/vibe-app
        run: npm run android:build:debug:apk

      - name: Build Android release APK
        working-directory: apps/vibe-app
        run: npm run android:build:apk

      - name: Build Android release AAB
        working-directory: apps/vibe-app
        run: npm run android:build:aab

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail

          debug_apk="apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk"
          release_apk="$(find apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk -type f -path '*release/*.apk' | head -n 1)"
          release_aab="$(find apps/vibe-app/src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' | head -n 1)"

          test -f "$debug_apk"
          test -n "$release_apk" && test -f "$release_apk"
          test -n "$release_aab" && test -f "$release_aab"

          cp "$debug_apk" "$GITHUB_WORKSPACE/vibe-everywhere-android-${RELEASE_TAG}-arm64-debug.apk"

          release_apk_name="vibe-everywhere-android-${RELEASE_TAG}-arm64-release.apk"
          if [[ "$release_apk" == *unsigned.apk ]]; then
            release_apk_name="vibe-everywhere-android-${RELEASE_TAG}-arm64-release-unsigned.apk"
          fi
          cp "$release_apk" "$GITHUB_WORKSPACE/$release_apk_name"
          cp "$release_aab" "$GITHUB_WORKSPACE/vibe-everywhere-android-${RELEASE_TAG}-arm64-release.aab"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: vibe-everywhere-android-arm64-${{ github.ref_name }}
          path: |
            ${{ github.workspace }}/vibe-everywhere-android-${{ github.ref_name }}-arm64-*.apk
            ${{ github.workspace }}/vibe-everywhere-android-${{ github.ref_name }}-arm64-*.aab
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs:
      - linux-overlay-smoke
      - build-cli
      - build-desktop
      - build-android
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: vibe-everywhere-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Render release notes
        run: ./scripts/render-release-notes.sh "${{ github.ref_name }}" release-assets > release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            release-assets/*
