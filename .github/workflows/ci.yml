name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24.14.0"
  PROTOC_VERSION: "34.1"
  NPCAP_SDK_VERSION: "1.16"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "25.2.9519653"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --locked -p vibe-relay -p vibe-agent -p vibe-app

      - name: Run workspace tests
        run: cargo test --locked --workspace --all-targets -- --nocapture

      - name: Build frontend
        working-directory: apps/vibe-app
        run: npm run build

      - name: Run relay polling smoke test
        run: ./scripts/dual-process-smoke.sh relay_polling

  linux-overlay-smoke:
    name: Linux Overlay Smoke
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libdbus-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run hosted Linux overlay smoke
        env:
          TMPDIR: ${{ runner.temp }}
          VIBE_TEST_EASYTIER_NO_TUN: "1"
        run: ./scripts/dual-process-smoke.sh overlay

      - name: Upload overlay smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-overlay-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vibe-everywhere-dual-process.*
          if-no-files-found: ignore
          retention-days: 14

  linux-cli-compat:
    name: Linux CLI Compatibility
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux musl build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            build-essential \
            file \
            musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Linux CLI release binaries
        run: cargo build --locked --release --target x86_64-unknown-linux-musl -p vibe-relay -p vibe-agent

      - name: Verify static Linux CLI binaries
        shell: bash
        run: |
          set -euo pipefail
          for binary in \
            target/x86_64-unknown-linux-musl/release/vibe-relay \
            target/x86_64-unknown-linux-musl/release/vibe-agent; do
            file "$binary" | grep -E "statically linked|static-pie linked"
            if readelf -d "$binary" 2>/dev/null | grep -q '(NEEDED)'; then
              echo "Unexpected dynamic dependency in $binary" >&2
              exit 1
            fi
          done

  android-mobile:
    name: Android Mobile
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          cache-dependency-path: |
            apps/vibe-app/src-tauri/gen/android/**/*.gradle*
            apps/vibe-app/src-tauri/gen/android/**/gradle-wrapper.properties
            apps/vibe-app/src-tauri/gen/android/**/gradle.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore Android SDK component cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/licenses
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/platforms/android-${{ env.ANDROID_API_LEVEL }}
            ${{ env.ANDROID_SDK_ROOT }}/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: android-sdk-${{ runner.os }}-api${{ env.ANDROID_API_LEVEL }}-bt${{ env.ANDROID_BUILD_TOOLS_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}-v1

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses > /dev/null

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Validate Android toolchain
        working-directory: apps/vibe-app
        run: npm run android:doctor

      - name: Build Android debug APK
        working-directory: apps/vibe-app
        run: npm run android:build:debug:apk

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: vibe-everywhere-android-arm64-debug
          path: apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          if-no-files-found: error
          retention-days: 14

  windows-compat:
    name: Windows Compatibility
    needs: verify
    runs-on: windows-2022
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Npcap SDK import libraries
        shell: pwsh
        run: |
          $sdkZip = Join-Path $env:RUNNER_TEMP "npcap-sdk.zip"
          $sdkDir = Join-Path $env:RUNNER_TEMP "npcap-sdk"
          curl.exe -fsSL --retry 5 --retry-all-errors "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip" -o $sdkZip
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force
          $packetLib = Get-ChildItem -Path $sdkDir -Recurse -Filter Packet.lib |
            Where-Object { $_.FullName -match '[\\/]+Lib[\\/]+x64[\\/]+Packet\.lib$' } |
            Select-Object -First 1
          if (-not $packetLib) {
            throw "Npcap Packet.lib not found under $sdkDir"
          }
          $libDir = $packetLib.Directory.FullName
          "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check Windows Rust targets
        run: cargo check --locked -p vibe-relay -p vibe-agent

      - name: Run Windows relay smoke test
        shell: pwsh
        run: ./scripts/dual-process-smoke.ps1 relay_polling

      - name: Upload Windows smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-relay-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vibe-everywhere-windows-smoke-*
          if-no-files-found: ignore
          retention-days: 14

      - name: Check Windows Tauri MSI bundle
        if: ${{ success() }}
        working-directory: apps/vibe-app
        run: npm run tauri -- build --debug --bundles msi --no-sign --ci
