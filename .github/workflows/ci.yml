name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  NPCAP_SDK_VERSION: "1.16"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "25.2.9519653"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --locked -p vibe-relay -p vibe-agent -p vibe-app

      - name: Run workspace tests
        run: cargo test --locked --workspace --all-targets -- --nocapture

      - name: Build frontend
        working-directory: apps/vibe-app
        run: npm run build

      - name: Run relay polling smoke test
        run: ./scripts/dual-process-smoke.sh relay_polling

  android-mobile:
    name: Android Mobile
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses > /dev/null
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Ensure loopback binding
        shell: bash
        run: |
          ip addr show dev lo | grep -q '127\\.0\\.0\\.1/' || sudo ip addr add 127.0.0.1/8 dev lo

      - name: Build Android debug APK
        working-directory: apps/vibe-app
        run: npm run android:build:debug:apk

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-remote-android-arm64-debug
          path: apps/vibe-app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          if-no-files-found: error
          retention-days: 14

  windows-compat:
    name: Windows Compatibility
    needs: verify
    runs-on: windows-2022
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Npcap SDK import libraries
        shell: pwsh
        run: |
          $sdkZip = Join-Path $env:RUNNER_TEMP "npcap-sdk.zip"
          $sdkDir = Join-Path $env:RUNNER_TEMP "npcap-sdk"
          curl.exe -fsSL --retry 5 --retry-all-errors "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip" -o $sdkZip
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force
          $packetLib = Get-ChildItem -Path $sdkDir -Recurse -Filter Packet.lib |
            Where-Object { $_.FullName -match '[\\/]+Lib[\\/]+x64[\\/]+Packet\.lib$' } |
            Select-Object -First 1
          if (-not $packetLib) {
            throw "Npcap Packet.lib not found under $sdkDir"
          }
          $libDir = $packetLib.Directory.FullName
          "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check Windows Rust targets
        run: cargo check --locked -p vibe-relay -p vibe-agent

      - name: Check Windows Tauri MSI bundle
        working-directory: apps/vibe-app
        run: npm run tauri -- build --debug --bundles msi --no-sign --ci
