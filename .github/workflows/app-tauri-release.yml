name: App Tauri Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-tauri-v*"

permissions:
  contents: write

concurrency:
  group: app-tauri-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate vibe-app-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Run promotion validation
        run: yarn workspace vibe-app-tauri validate:promotion

      - name: Validate promotion review docs
        run: yarn --cwd scripts validate:vibe-app-tauri-promotion

      - name: Enforce promotion-ready docs for tagged releases
        if: github.event_name == 'push'
        run: yarn --cwd scripts validate:vibe-app-tauri-promotion:ready

  build:
    name: Package vibe-app-tauri
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/vibe-app-tauri/src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Build release bundles
        run: yarn workspace vibe-app-tauri tauri:build

      - name: Record promotion baseline
        run: yarn --cwd scripts metrics:vibe-app-tauri artifacts/vibe-app-tauri/promotion-baseline-${{ matrix.label }}.md

      - name: Upload promotion baseline
        uses: actions/upload-artifact@v4
        with:
          name: app-tauri-promotion-baseline-${{ matrix.label }}
          path: artifacts/vibe-app-tauri/promotion-baseline-${{ matrix.label }}.md
          if-no-files-found: error

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: app-tauri-release-${{ matrix.label }}
          path: packages/vibe-app-tauri/src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: app-tauri-release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/**
