name: App Release

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Which app targets to package
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - desktop
          - android
      app_env:
        description: Runtime environment for web and desktop builds
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development
      android_profile:
        description: EAS build profile for Android packaging
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: packages/vibe-app
  EXPO_PUBLIC_VIBE_SERVER_URL: ${{ vars.EXPO_PUBLIC_VIBE_SERVER_URL }}
  EXPO_PUBLIC_VIBE_LOG_SERVER_URL: ${{ vars.EXPO_PUBLIC_VIBE_LOG_SERVER_URL }}
  EXPO_PUBLIC_VIBE_POSTHOG_KEY: ${{ vars.EXPO_PUBLIC_VIBE_POSTHOG_KEY }}
  EXPO_PUBLIC_VIBE_REVENUE_CAT_APPLE: ${{ vars.EXPO_PUBLIC_VIBE_REVENUE_CAT_APPLE }}
  EXPO_PUBLIC_VIBE_REVENUE_CAT_GOOGLE: ${{ vars.EXPO_PUBLIC_VIBE_REVENUE_CAT_GOOGLE }}
  EXPO_PUBLIC_VIBE_REVENUE_CAT_STRIPE: ${{ vars.EXPO_PUBLIC_VIBE_REVENUE_CAT_STRIPE }}
  VIBE_EAS_PROJECT_ID: ${{ vars.VIBE_EAS_PROJECT_ID || secrets.VIBE_EAS_PROJECT_ID }}
  VIBE_EAS_UPDATE_URL: ${{ vars.VIBE_EAS_UPDATE_URL }}
  VIBE_EAS_OWNER: ${{ vars.VIBE_EAS_OWNER || secrets.VIBE_EAS_OWNER || github.repository_owner }}
  VIBE_GOOGLE_SERVICES_JSON: ${{ secrets.VIBE_GOOGLE_SERVICES_JSON }}

jobs:
  validate:
    name: Validate vibe-app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Typecheck vibe-app
        run: yarn workspace vibe-app typecheck

      - name: Test vibe-app
        run: yarn workspace vibe-app test --exclude 'sources/**/*.integration.spec.ts'

  web:
    name: Package Web
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' || inputs.targets == 'all' || inputs.targets == 'web' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Resolve app environment
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            app_env="production"
            label="${GITHUB_REF_NAME}"
          else
            app_env="${{ inputs.app_env }}"
            label="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "app_env=${app_env}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"

      - name: Export web build
        shell: bash
        run: |
          set -euo pipefail
          cd "${APP_DIR}"
          rm -rf dist
          VIBE_APP_ENV="${{ steps.meta.outputs.app_env }}" \
          APP_ENV="${{ steps.meta.outputs.app_env }}" \
          npx expo export --platform web --output-dir dist

      - name: Archive web build
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="dist/vibe-app-web-${{ steps.meta.outputs.label }}.tar.gz"
          tar -czf "${archive}" -C "${APP_DIR}" dist
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-web
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

  desktop:
    name: Package Desktop
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    if: ${{ github.event_name == 'push' || inputs.targets == 'all' || inputs.targets == 'desktop' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_label: linux-x86_64
          - os: macos-latest
            target_label: macos
          - os: windows-latest
            target_label: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/vibe-app/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Resolve desktop build inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            app_env="production"
            label="${GITHUB_REF_NAME}"
          else
            app_env="${{ inputs.app_env }}"
            label="manual-${GITHUB_RUN_NUMBER}"
          fi

          case "${app_env}" in
            development) script="tauri:build:dev" ;;
            preview) script="tauri:build:preview" ;;
            production) script="tauri:build:production" ;;
            *) echo "Unsupported app env: ${app_env}" >&2; exit 1 ;;
          esac

          echo "app_env=${app_env}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"
          echo "script=${script}" >> "${GITHUB_OUTPUT}"

      - name: Build desktop bundles
        run: yarn workspace vibe-app ${{ steps.meta.outputs.script }}

      - name: Archive desktop bundles
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${APP_DIR}/src-tauri/target/release/bundle"
          if [[ ! -d "${bundle_dir}" ]]; then
            echo "Expected bundle directory not found: ${bundle_dir}" >&2
            exit 1
          fi

          mkdir -p dist
          archive="dist/vibe-app-desktop-${{ matrix.target_label }}-${{ steps.meta.outputs.label }}.tar.gz"
          tar -czf "${archive}" -C "${APP_DIR}/src-tauri/target/release" bundle
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-desktop-${{ matrix.target_label }}
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

  android:
    name: Package Android
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ github.event_name == 'push' || inputs.targets == 'all' || inputs.targets == 'android' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Ensure EXPO_TOKEN is configured
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "${EXPO_TOKEN}" ]]; then
            echo "Missing EXPO_TOKEN secret. Android packaging uses EAS Build." >&2
            exit 1
          fi

      - name: Ensure EAS project ID is configured
        shell: bash
        run: |
          if [[ -z "${VIBE_EAS_PROJECT_ID}" ]]; then
            echo "Missing VIBE_EAS_PROJECT_ID. Set it as a GitHub variable or secret." >&2
            exit 1
          fi

      - name: Resolve EAS owner
        shell: bash
        run: |
          if [[ -z "${VIBE_EAS_OWNER}" ]]; then
            echo "Missing VIBE_EAS_OWNER and unable to derive a fallback owner." >&2
            exit 1
          fi

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Materialize Google services file
        if: ${{ env.VIBE_GOOGLE_SERVICES_JSON != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${VIBE_GOOGLE_SERVICES_JSON}" > "${APP_DIR}/google-services.ci.json"
          echo "VIBE_GOOGLE_SERVICES_FILE=./google-services.ci.json" >> "${GITHUB_ENV}"

      - name: Resolve Android build inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            profile="production"
            label="${GITHUB_REF_NAME}"
          else
            profile="${{ inputs.android_profile }}"
            label="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "profile=${profile}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"

      - name: Link EAS project for non-interactive builds
        shell: bash
        working-directory: ${{ github.workspace }}/packages/vibe-app
        run: |
          set -euo pipefail
          eas init --id "${VIBE_EAS_PROJECT_ID}" --force --non-interactive

      - name: Build Android package on EAS and download artifact
        shell: bash
        working-directory: ${{ github.workspace }}/packages/vibe-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/dist"
          json_path="${GITHUB_WORKSPACE}/dist/vibe-app-android-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.label }}.json"

          eas build \
            --platform android \
            --profile "${{ steps.meta.outputs.profile }}" \
            --non-interactive \
            --wait \
            --json > "${json_path}"

          artifact_url="$(jq -r '
            if type == "array" then
              (.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty)
            else
              (.artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty)
            end
          ' "${json_path}")"

          build_page_url="$(jq -r '
            if type == "array" then
              (.[0].buildDetailsPageUrl // empty)
            else
              (.buildDetailsPageUrl // empty)
            end
          ' "${json_path}")"

          if [[ -z "${artifact_url}" ]]; then
            echo "Unable to resolve Android artifact URL from EAS build output." >&2
            cat "${json_path}" >&2
            exit 1
          fi

          url_no_query="${artifact_url%%\?*}"
          filename="$(basename "${url_no_query}")"
          case "${filename}" in
            *.apk|*.aab) ;;
            *) filename="vibe-app-android-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.label }}.aab" ;;
          esac

          curl -L "${artifact_url}" -o "${GITHUB_WORKSPACE}/dist/${filename}"

          {
            echo "profile=${{ steps.meta.outputs.profile }}"
            echo "artifact_url=${artifact_url}"
            echo "build_page_url=${build_page_url}"
            echo "filename=${filename}"
          } > "${GITHUB_WORKSPACE}/dist/vibe-app-android-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.label }}.txt"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-android
          path: |
            dist/vibe-app-android-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.label }}.json
            dist/vibe-app-android-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.label }}.txt
            dist/*.apk
            dist/*.aab
          if-no-files-found: error

  publish:
    name: Publish App Release
    needs:
      - web
      - desktop
      - android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        (needs.web.result == 'success' || needs.web.result == 'skipped') &&
        (needs.desktop.result == 'success' || needs.desktop.result == 'skipped') &&
        (needs.android.result == 'success' || needs.android.result == 'skipped')
      }}

    steps:
      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: app-release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
