name: App Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: packages/vibe-app-tauri

jobs:
  validate:
    name: Validate vibe-app-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Validate vibe-app-tauri
        run: yarn workspace vibe-app-tauri validate:promotion

  desktop:
    name: Package vibe-app-tauri desktop
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_label: linux-x86_64
          - os: macos-latest
            target_label: macos
          - os: windows-latest
            target_label: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/vibe-app-tauri/src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            label="${GITHUB_REF_NAME}"
          else
            label="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "label=${label}" >> "${GITHUB_OUTPUT}"

      - name: Build desktop bundles
        run: yarn workspace vibe-app-tauri tauri:build

      - name: Archive desktop bundles
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${APP_DIR}/src-tauri/target/release/bundle"
          if [[ ! -d "${bundle_dir}" ]]; then
            echo "Expected bundle directory not found: ${bundle_dir}" >&2
            exit 1
          fi

          mkdir -p dist
          archive="dist/vibe-app-tauri-desktop-${{ matrix.target_label }}-${{ steps.meta.outputs.label }}.tar.gz"
          tar -czf "${archive}" -C "${APP_DIR}/src-tauri/target/release" bundle
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-desktop-${{ matrix.target_label }}
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish App Release
    needs:
      - desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        needs.desktop.result == 'success'
      }}

    steps:
      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: app-release-*
          merge-multiple: true
          path: dist

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          find dist -type f -name '*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            cp "${file}" "release-assets/$(basename "${file}")"
          done

          echo "Release assets:"
          find release-assets -maxdepth 1 -type f | sort

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
