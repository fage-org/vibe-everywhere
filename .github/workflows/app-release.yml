name: App Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Release profile to package
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production-candidate
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: packages/vibe-app-tauri

jobs:
  metadata:
    name: Resolve App Release Metadata
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.meta.outputs.profile }}
      label: ${{ steps.meta.outputs.label }}
      browser_dir: ${{ steps.meta.outputs.browser_dir }}
      android_variant: ${{ steps.meta.outputs.android_variant }}
      desktop_product_name: ${{ steps.meta.outputs.desktop_product_name }}

    steps:
      - name: Resolve profile and labels
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            profile="production-candidate"
            label="${GITHUB_REF_NAME}"
          else
            profile="${{ inputs.profile }}"
            label="manual-${profile}-${GITHUB_RUN_NUMBER}"
          fi

          if [[ "${profile}" == "preview" ]]; then
            browser_dir="preview"
            android_variant="debug"
            desktop_product_name="Vibe Desktop Next Preview"
          else
            browser_dir="production"
            android_variant="release"
            desktop_product_name="Vibe Desktop Next Candidate"
          fi

          echo "profile=${profile}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"
          echo "browser_dir=${browser_dir}" >> "${GITHUB_OUTPUT}"
          echo "android_variant=${android_variant}" >> "${GITHUB_OUTPUT}"
          echo "desktop_product_name=${desktop_product_name}" >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate vibe-app-tauri
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Validate vibe-app-tauri
        run: |
          yarn workspace vibe-app-tauri typecheck
          yarn workspace vibe-app-tauri test
          yarn workspace vibe-app-tauri tauri:test

  desktop:
    name: Package vibe-app-tauri desktop
    needs:
      - metadata
      - validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_label: linux-x86_64
          - os: macos-latest
            target_label: macos
          - os: windows-latest
            target_label: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/vibe-app-tauri/src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile --network-timeout 600000; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "yarn install failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "yarn install failed on attempt ${attempt}; retrying..." >&2
            sleep 15
          done

      - name: Build desktop bundles
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.metadata.outputs.profile }}" == "preview" ]]; then
            yarn workspace vibe-app-tauri tauri:build:preview
          else
            yarn workspace vibe-app-tauri tauri:build:production-candidate
          fi

      - name: Collect desktop installer assets
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${APP_DIR}/src-tauri/target/release/bundle"
          if [[ ! -d "${bundle_dir}" ]]; then
            echo "Expected bundle directory not found: ${bundle_dir}" >&2
            exit 1
          fi

          mkdir -p dist
          find "${bundle_dir}" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -print0 | while IFS= read -r -d '' file; do
              base_name="$(basename "${file}")"
              if [[ "${base_name}" != *"${{ needs.metadata.outputs.desktop_product_name }}"* ]]; then
                continue
              fi
              cp "${file}" "dist/$(basename "${file}")"
            done

          if ! find dist -maxdepth 1 -type f | grep -q .; then
            echo "No desktop installer assets were collected from ${bundle_dir}" >&2
            exit 1
          fi

          echo "asset_dir=dist" >> "${GITHUB_OUTPUT}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-desktop-${{ matrix.target_label }}
          path: ${{ steps.collect.outputs.asset_dir }}/*
          if-no-files-found: error

  browser:
    name: Package vibe-app-tauri browser export
    needs:
      - metadata
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Build retained browser export
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.metadata.outputs.profile }}" == "preview" ]]; then
            yarn workspace vibe-app-tauri browser:build:preview
          else
            yarn workspace vibe-app-tauri browser:build
          fi

      - name: Archive browser export
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          browser_dir="${APP_DIR}/dist/browser/${{ needs.metadata.outputs.browser_dir }}"
          if [[ ! -d "${browser_dir}" ]]; then
            echo "Expected browser export directory not found: ${browser_dir}" >&2
            exit 1
          fi

          mkdir -p dist
          archive="dist/vibe-app-tauri-browser-${{ needs.metadata.outputs.profile }}-${{ needs.metadata.outputs.label }}.tar.gz"
          tar -czf "${archive}" -C "${APP_DIR}/dist/browser" "${{ needs.metadata.outputs.browser_dir }}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload browser artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-browser
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

  android:
    name: Package vibe-app-tauri Android APK
    needs:
      - metadata
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Prepare Android release properties
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.metadata.outputs.profile }}" == "preview" ]]; then
            yarn workspace vibe-app-tauri release:prepare:preview
          else
            yarn workspace vibe-app-tauri release:prepare:production-candidate
          fi

      - name: Build Android APK
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.metadata.outputs.profile }}" == "preview" ]]; then
            yarn workspace vibe-app-tauri mobile:android:preview:apk
          else
            yarn workspace vibe-app-tauri mobile:android:production-candidate:apk
          fi

      - name: Archive Android APK
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          apk_dir_candidates=(
            "${APP_DIR}/src-tauri/gen/android/app/build/outputs/apk/universal/${{ needs.metadata.outputs.android_variant }}"
            "${APP_DIR}/android/app/build/outputs/apk/universal/${{ needs.metadata.outputs.android_variant }}"
          )

          apk_path=""
          for apk_dir in "${apk_dir_candidates[@]}"; do
            if [[ ! -d "${apk_dir}" ]]; then
              continue
            fi

            candidate_apk="$(
              find "${apk_dir}" -maxdepth 1 -type f -name '*.apk' \
                ! -name '*-unsigned.apk' \
                | sort | head -n 1
            )"
            if [[ -z "${candidate_apk}" ]]; then
              candidate_apk="$(find "${apk_dir}" -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
            fi
            if [[ -n "${candidate_apk}" ]]; then
              apk_path="${candidate_apk}"
              break
            fi
          done

          if [[ -z "${apk_path}" ]]; then
            echo "Expected APK not found under: ${apk_dir_candidates[*]}" >&2
            exit 1
          fi

          mkdir -p dist
          archive="dist/vibe-app-tauri-android-${{ needs.metadata.outputs.profile }}-${{ needs.metadata.outputs.label }}.apk"
          cp "${apk_path}" "${archive}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-android
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish App Release
    needs:
      - metadata
      - browser
      - android
      - desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        needs.desktop.result == 'success' &&
        needs.browser.result == 'success' &&
        needs.android.result == 'success'
      }}

    steps:
      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: app-release-*
          merge-multiple: true
          path: dist

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          find dist -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.apk' -o -name 'vibe-app-tauri-browser-*.tar.gz' \) \
            -print0 | while IFS= read -r -d '' file; do
            cp "${file}" "release-assets/$(basename "${file}")"
          done

          if ! find release-assets -maxdepth 1 -type f | grep -q .; then
            echo "No publishable release assets were collected." >&2
            exit 1
          fi

          echo "Release assets:"
          find release-assets -maxdepth 1 -type f | sort

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
