name: Setup protoc
description: Install a pinned protoc release from protocolbuffers/protobuf without relying on deprecated Node-based actions.

inputs:
  version:
    description: Protoc release version without the leading v.
    required: false
    default: "34.1"

runs:
  using: composite
  steps:
    - name: Install protoc on Linux
      if: runner.os == 'Linux'
      shell: bash
      env:
        PROTOC_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        case "${RUNNER_ARCH}" in
          X64)
            archive="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            ;;
          ARM64)
            archive="protoc-${PROTOC_VERSION}-linux-aarch_64.zip"
            ;;
          *)
            echo "Unsupported Linux runner architecture: ${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        install_dir="${RUNNER_TEMP}/protoc-${PROTOC_VERSION}"
        archive_path="${RUNNER_TEMP}/${archive}"
        download_url="https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${archive}"

        rm -rf "${install_dir}"
        curl -fsSL --retry 5 --retry-all-errors "${download_url}" -o "${archive_path}"
        unzip -q "${archive_path}" -d "${install_dir}"

        echo "${install_dir}/bin" >> "${GITHUB_PATH}"
        echo "PROTOC=${install_dir}/bin/protoc" >> "${GITHUB_ENV}"
        echo "PROTOC_INCLUDE=${install_dir}/include" >> "${GITHUB_ENV}"

        "${install_dir}/bin/protoc" --version

    - name: Install protoc on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        PROTOC_VERSION: ${{ inputs.version }}
      run: |
        switch ($env:RUNNER_ARCH) {
          "X64" { $archive = "protoc-$env:PROTOC_VERSION-win64.zip" }
          default { throw "Unsupported Windows runner architecture: $env:RUNNER_ARCH" }
        }

        $installDir = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOC_VERSION"
        $archivePath = Join-Path $env:RUNNER_TEMP $archive
        $downloadUrl = "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/$archive"

        if (Test-Path $installDir) {
          Remove-Item $installDir -Recurse -Force
        }

        curl.exe -fsSL --retry 5 --retry-all-errors $downloadUrl -o $archivePath
        Expand-Archive -Path $archivePath -DestinationPath $installDir -Force

        Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $installDir "bin")
        Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$(Join-Path $installDir 'bin\protoc.exe')"
        Add-Content -Path $env:GITHUB_ENV -Value "PROTOC_INCLUDE=$(Join-Path $installDir 'include')"

        & (Join-Path $installDir "bin\protoc.exe") --version
