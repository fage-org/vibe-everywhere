[package]
name = "vibe-app-tauri-desktop"
version = "0.1.0"
description = "Wave 8 desktop bootstrap shell for Vibe"
authors = ["Vibe Contributors"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "vibe_app_tauri_desktop"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.4.0", features = [] }

[dependencies]
log = "0.4"
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.8.2", features = [] }
tauri-plugin-notification = "2.3.3"
tauri-plugin-http = "2.5.8"
tauri-plugin-log = "2.8.0"
tiny_http = "0.12.0"
webbrowser = "1.0.5"

[target.'cfg(not(target_os = "android"))'.dependencies]
keyring = { version = "3.6.2", default-features = false, features = ["apple-native", "windows-native", "linux-native-sync-persistent", "crypto-rust"] }
rfd = "0.17.2"

[workspace]
